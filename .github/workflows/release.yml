name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Build binary
        run: |
          mkdir -p web/dist
          cp -r web/dist web/dist || true
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o cc2api ./cmd/server/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc2api-linux-amd64
          path: cc2api

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mamoworks/cc2api:latest
            ghcr.io/mamoworks/cc2api:${{ github.sha }}
