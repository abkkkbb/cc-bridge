services:
  cc-bridge:
    image: ghcr.io/abkkkbb/cc-bridge:latest
    container_name: cc-bridge
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${SERVER_PORT:-5674}:5674"
    volumes:
      - cc-bridge-data:/app/data
    restart: unless-stopped

